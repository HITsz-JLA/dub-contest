<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配音比赛作品展示</title>
  <link rel="stylesheet" href="style-voice-contest.css">
</head>
<body>
  <div class="voice-team-info">
    <div class="voice-title-center">
      <h2>配音比赛 · 参赛队伍</h2>
    </div>
    <div class="voice-title-center">
      <img src="team-banner.jpg" class="voice-banner" alt="队伍横幅">
      <h3>队伍名称：大哥了</h3>
    </div>
  </div>

  <div class="voice-card">
    <div class="voice-card-header">
      <img src="header-img.jpg" class="voice-card-header-img" alt="作品头图">
      <div class="voice-card-header-emblem" style="background-image: url('emblem.png');"></div>
    </div>
    <div class="voice-card-title">
      <h5>作品类型：动画配音</h5>
      <h4>《乒乓》</h4>
      <h5>选手：裘盛蕊、卡基米</h5>
    </div>
    <div class="voice-card-info">
      <span class="voice-label">原创</span>
    </div>
    <div class="voice-card-score">98.5</div>
    <div class="voice-card-stars">★★★★★</div>
    <div class="voice-card-stats">
      <p>总分：9850</p>
      <div class="voice-card-bar"><div class="voice-card-bar-inner" style="width:98%"></div></div>
      <p>中位分：980</p>
      <div class="voice-card-bar"><div class="voice-card-bar-inner" style="width:98%"></div></div>
    </div>
    <div class="voice-card-footer">
      No.001 / 类型：动画 / 更新时间：2026-04-03
    </div>
  </div>

  <div class="voice-card">
    <div class="voice-card-header">
      <img src="header-img2.jpg" class="voice-card-header-img" alt="作品头图">
      <div class="voice-card-header-emblem" style="background-image: url('emblem2.png');"></div>
    </div>
    <div class="voice-card-title">
      <h5>作品类型：日剧</h5>
      <h4>《斗牌传说》</h4>
      <h5>选手：赫尔达、学生妹</h5>
    </div>
    <div class="voice-card-info">
      <span class="voice-label">日麻</span>
    </div>
    <div class="voice-card-score">95.0</div>
    <div class="voice-card-stars">★★★★☆</div>
    <div class="voice-card-stats">
      <p>总分：9500</p>
      <div class="voice-card-bar"><div class="voice-card-bar-inner" style="width:95%"></div></div>
      <p>中位分：940</p>
      <div class="voice-card-bar"><div class="voice-card-bar-inner" style="width:94%"></div></div>
    </div>
    <div class="voice-card-footer">
      No.002 / 类型：日剧 / 更新时间：2026-04-03
    </div>
  </div>

  <div class="voice-team-points">
    队伍总积分：19350
  </div>
</body>
</html>
